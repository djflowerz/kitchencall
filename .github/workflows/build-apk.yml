name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate missing Android platform folder
        run: flutter create --platforms=android .

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitchencall-customer-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Publish downloadable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: Latest KitchenCall build
          body: Automatically built from the latest push to main. Download app-release.apk below and install it on your Android device.
          prerelease: true
          files: build/app/outputs/flutter-apk/app-release.apk
